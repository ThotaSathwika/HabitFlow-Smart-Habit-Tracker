{% extends "base.html" %}

{% block content %}
<div class="row flex-grow-1 align-items-center justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="glass-card p-5 text-center auth-card">
            <div class="mb-4">
                <i class="fa-solid fa-layer-group fa-3x text-primary-glow mb-3"></i>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Sign in to continue to HabitFlow AI</p>
            </div>
            <form method="POST" action="">
                <div class="form-floating mb-3 glass-input-group">
                    <input type="email" class="form-control glass-input" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating mb-4 glass-input-group">
                    <input type="password" class="form-control glass-input" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check text-start">
                        <input class="form-check-input bg-transparent" type="checkbox" value="1" id="remember" name="remember">
                        <label class="form-check-label" for="remember">
                            Remember me
                        </label>
                    </div>
                </div>
                <button class="btn btn-primary w-100 py-2 glass-btn-primary" type="submit">Sign In</button>
            </form>
            <div class="mt-4">
                <p class="text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none text-primary-glow">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
