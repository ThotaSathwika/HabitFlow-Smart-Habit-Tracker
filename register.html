{% extends "base.html" %}

{% block content %}
<div class="row flex-grow-1 align-items-center justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="glass-card p-5 text-center auth-card">
            <div class="mb-4">
                <i class="fa-solid fa-layer-group fa-3x text-primary-glow mb-3"></i>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join HabitFlow AI and level up your life</p>
            </div>
            <form method="POST" action="">
                <div class="form-floating mb-3 glass-input-group">
                    <input type="text" class="form-control glass-input" id="username" name="username" placeholder="Username" required>
                    <label for="username">Username</label>
                </div>
                <div class="form-floating mb-3 glass-input-group">
                    <input type="email" class="form-control glass-input" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating mb-4 glass-input-group">
                    <input type="password" class="form-control glass-input" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <button class="btn btn-primary w-100 py-2 glass-btn-primary" type="submit">Sign Up</button>
            </form>
            <div class="mt-4">
                <p class="text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none text-primary-glow">Log In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
