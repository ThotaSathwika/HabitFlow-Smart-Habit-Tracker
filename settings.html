{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center h-100">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-4">
            <h5 class="fw-bold mb-4"><i class="fa-solid fa-gear text-primary-glow me-2"></i>Settings</h5>
            
            <form method="POST" action="">
                <h6 class="fw-bold mb-3 text-muted border-bottom border-secondary pb-2">Profile Details</h6>
                <div class="form-floating mb-3 glass-input-group">
                    <input type="text" class="form-control glass-input" id="username" name="username" value="{{ current_user.username }}">
                    <label for="username">Username</label>
                </div>
                <div class="form-floating mb-4 glass-input-group">
                    <input type="email" class="form-control glass-input" id="email" name="email" value="{{ current_user.email }}">
                    <label for="email">Email address</label>
                </div>

                <h6 class="fw-bold mb-3 text-muted border-bottom border-secondary pb-2 mt-4">Preferences</h6>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" role="switch" id="darkMode" checked disabled>
                    <label class="form-check-label" for="darkMode">Neon Dark Mode (Enforced)</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" role="switch" id="emailNotifications" checked>
                    <label class="form-check-label" for="emailNotifications">Smart Reminders (Email)</label>
                </div>
                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" role="switch" id="motivationalQuotes" checked>
                    <label class="form-check-label" for="motivationalQuotes">Daily AI Motivation</label>
                </div>
                
                <h6 class="fw-bold mb-3 text-muted border-bottom border-secondary pb-2 mt-4">Data Management</h6>
                <div class="d-flex gap-2 mb-4">
                    <button type="button" class="btn btn-outline-info glass-btn btn-sm"><i class="fa-solid fa-download me-2"></i>Export CSV</button>
                    <button type="button" class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-trash me-2"></i>Reset Data</button>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary glass-btn-primary px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
